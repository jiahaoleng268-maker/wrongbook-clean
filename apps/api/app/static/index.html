<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#256f67" />
    <title>WrongBook</title>
    <link rel="manifest" href="/app/static/manifest.webmanifest" />
    <link rel="icon" href="/app/static/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/app/static/app.css" />
  </head>
  <body>
    <a class="skip-link" href="#mainContent">跳到主要内容</a>
    <header class="top-bar">
      <div>
        <p class="eyebrow">WrongBook</p>
        <h1>错题整理</h1>
      </div>
      <button class="ghost-button" id="refreshButton" type="button">刷新</button>
    </header>

    <main id="mainContent" class="app-shell" tabindex="-1">
      <section class="upload-panel app-view" data-view="home" aria-labelledby="uploadTitle">
        <div class="section-heading">
          <h2 id="uploadTitle">上传错题</h2>
          <span id="uploadState" class="state-text" role="status" aria-live="polite">等待图片</span>
        </div>
        <form id="uploadForm" class="upload-form">
          <div class="source-picker-grid" role="group" aria-label="&#36873;&#25321;&#22270;&#29255;&#26469;&#28304;">
            <label class="source-picker camera-picker">
              <strong>&#25293;&#29031;&#24405;&#20837;</strong>
              <span>&#30452;&#25509;&#25171;&#24320;&#21518;&#32622;&#30456;&#26426;</span>
              <input id="cameraInput" type="file" accept="image/*" capture="environment" />
            </label>
            <label class="source-picker gallery-picker">
              <strong>&#20174;&#22270;&#24211;&#36873;&#25321;</strong>
              <span>&#21487;&#19968;&#27425;&#36873;&#25321;&#22810;&#24352;&#29616;&#26377;&#22270;&#29255;</span>
              <input id="galleryInput" type="file" accept="image/*" multiple />
            </label>
          </div>
          <div class="selected-file-row">
            <span id="selectedImageName">&#23578;&#26410;&#36873;&#25321;&#22270;&#29255;</span>
            <button id="uploadButton" class="primary-button" type="submit" disabled>&#19978;&#20256;&#25152;&#36873;&#22270;&#29255;</button>
          </div>
        </form>
      </section>

      <section class="review-panel app-view" data-view="review" aria-labelledby="dueReviewTitle">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Review</p>
            <h2 id="dueReviewTitle">今日复习</h2>
          </div>
          <span id="dueReviewCount" class="state-text" role="status" aria-live="polite">0 条</span>
        </div>
        <div id="reviewStats" class="review-stats" aria-label="复习统计">
          <div><strong id="statsDueCount">0</strong><span>当前到期</span></div>
          <div><strong id="statsTodayCount">0</strong><span>今日完成</span></div>
          <div><strong id="statsWeekCount">0</strong><span>近 7 天</span></div>
          <div><strong id="statsMasteredRate">--</strong><span>掌握率</span></div>
          <div><strong id="statsResultSummary">0 / 0 / 0 / 0</strong><span>再来 / 难 / 掌握 / 简单</span></div>
        </div>
        <div id="reviewStatsStatus" class="inline-status" role="status" aria-live="polite"></div>
        <div id="dueReviewStatus" class="inline-status" role="status" aria-live="polite"></div>
        <div id="dueReviewList" class="due-review-list"></div>
      </section>

      <section class="review-history-panel app-view" data-view="review" aria-labelledby="reviewHistoryTitle">
        <div class="section-heading">
          <div><p class="eyebrow">History</p><h2 id="reviewHistoryTitle">复习历史</h2></div>
          <span id="reviewHistoryCount" class="state-text" role="status" aria-live="polite">0 条</span>
        </div>
        <div class="history-filters">
          <select id="reviewHistoryResultFilter" aria-label="复习结果筛选">
            <option value="">全部结果</option>
            <option value="again">再来一次</option>
            <option value="hard">困难</option>
            <option value="good">掌握</option>
            <option value="easy">简单</option>
          </select>
          <input id="reviewHistoryFromInput" type="date" aria-label="开始日期" />
          <input id="reviewHistoryToInput" type="date" aria-label="结束日期" />
          <button id="reviewHistoryFilterButton" class="ghost-button" type="button">筛选</button>
        </div>
        <div id="reviewHistoryStatus" class="inline-status" role="status" aria-live="polite"></div>
        <div id="reviewHistoryList" class="review-history-list"></div>
        <div class="pagination-controls">
          <button id="reviewHistoryPreviousButton" class="ghost-button" type="button">上一页</button>
          <span id="reviewHistoryPageText" class="state-text" role="status" aria-live="polite">第 1 页</span>
          <button id="reviewHistoryNextButton" class="ghost-button" type="button">下一页</button>
        </div>
      </section>

      <section class="library-stats-panel app-view" data-view="stats" aria-labelledby="libraryStatsTitle">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Library</p>
            <h2 id="libraryStatsTitle">题库概览</h2>
          </div>
          <strong id="libraryTotalCount">0 题</strong>
        </div>
        <div id="libraryStatsStatus" class="inline-status" role="status" aria-live="polite"></div>
        <div class="library-stats-grid">
          <div><h3>状态</h3><div id="libraryStatusStats" class="compact-stat-list"></div></div>
          <div><h3>科目</h3><div id="librarySubjectStats" class="compact-stat-list"></div></div>
          <div><h3>热门知识点</h3><div id="libraryKnowledgeStats" class="compact-stat-list"></div></div>
        </div>
      </section>

      <section class="workbench app-view" data-view="library" aria-label="错题工作区">
        <aside class="question-column">
          <div class="section-heading">
            <h2>错题列表</h2>
            <span id="listCount" class="state-text" role="status" aria-live="polite">0 条</span>
          </div>

          <div class="filters">
            <input id="searchInput" type="search" placeholder="搜索题目、科目或文本" autocomplete="off" />
            <select id="statusFilter" aria-label="状态筛选">
              <option value="">全部状态</option>
              <option value="draft">草稿</option>
              <option value="recognized">已识别</option>
              <option value="corrected">已校正</option>
              <option value="archived">已归档</option>
            </select>
          </div>
          <div class="filtered-export-actions">
            <button id="exportFilteredJsonButton" class="ghost-button" type="button">导出筛选 JSON</button>
            <button id="exportFilteredMarkdownButton" class="ghost-button" type="button">导出筛选 Markdown</button>
          </div>
          <div class="question-import-actions">
            <label class="import-file-picker" for="questionImportInput">
              <input id="questionImportInput" type="file" accept="application/json,.json" />
              <span id="questionImportFileLabel">&#36873;&#25321; WrongBook JSON</span>
            </label>
            <button id="importQuestionsButton" class="ghost-button" type="button">&#23548;&#20837;&#20026;&#26032;&#39064;&#30446;</button>
          </div>
          <div id="questionImportState" class="inline-status" role="status" aria-live="polite"></div>

          <div id="listStatus" class="inline-status" role="status" aria-live="polite"></div>
          <div id="questionList" class="question-list" role="list"></div>
          <div class="pagination-controls">
            <button id="questionPreviousButton" class="ghost-button" type="button">上一页</button>
            <span id="questionPageText" class="state-text" role="status" aria-live="polite">第 1 页</span>
            <button id="questionNextButton" class="ghost-button" type="button">下一页</button>
          </div>
        </aside>

        <section class="detail-column" aria-labelledby="detailTitle">
          <div id="emptyDetail" class="empty-detail">
            <h2 id="detailTitle">选择一道错题</h2>
            <p>上传后可以在这里校对 OCR 结果并补充科目、题型和难度。</p>
          </div>

          <form id="detailForm" class="detail-form" hidden>
            <div class="detail-header">
              <div>
                <p class="eyebrow" id="detailId">Question</p>
                <h2 id="detailHeading">错题详情</h2>
              </div>
              <button id="saveButton" class="primary-button" type="submit">保存</button>
            </div>

            <div id="detailStatus" class="inline-status" role="status" aria-live="polite"></div>

            <div class="detail-grid">
              <div class="image-frame">
                <img id="questionImage" alt="错题图片" />
              </div>

              <div class="field-grid">
                <label>
                  <span>标题</span>
                  <input id="titleInput" name="title" type="text" maxlength="255" />
                </label>
                <label>
                  <span>科目</span>
                  <input id="subjectInput" name="subject" type="text" maxlength="100" />
                </label>
                <label>
                  <span>题型</span>
                  <input id="typeInput" name="question_type" type="text" maxlength="100" />
                </label>
                <label>
                  <span>难度</span>
                  <select id="difficultyInput" name="difficulty">
                    <option value="">未设置</option>
                    <option value="easy">简单</option>
                    <option value="medium">中等</option>
                    <option value="hard">困难</option>
                  </select>
                </label>
                <label>
                  <span>状态</span>
                  <select id="questionStatusInput" name="status">
                    <option value="draft">草稿</option>
                    <option value="recognized">已识别</option>
                    <option value="corrected">已校正</option>
                    <option value="archived">已归档</option>
                  </select>
                </label>
              </div>
            </div>

            <div class="text-grid">
              <label>
                <span>OCR 原文</span>
                <textarea id="rawTextInput" readonly></textarea>
              </label>
              <label>
                <span>校正文</span>
                <textarea id="correctedTextInput" name="corrected_text"></textarea>
              </label>
            </div>

            <section class="learning-panel" aria-label="错因与复习计划">
              <div class="learning-block knowledge-point-block">
                <span>知识点</span>
                <div id="knowledgePointList" class="knowledge-point-list"></div>
                <div class="knowledge-point-create">
                  <input id="knowledgePointNameInput" type="text" maxlength="255" placeholder="新知识点名称" />
                  <input id="knowledgePointSubjectInput" type="text" maxlength="100" placeholder="科目（可选）" />
                  <button id="createKnowledgePointButton" class="ghost-button" type="button">新建知识点</button>
                </div>
                <span id="knowledgePointState" class="state-text" role="status" aria-live="polite"></span>
              </div>
              <label class="learning-block">
                <span>错因标签</span>
                <input id="mistakeTagsInput" type="text" list="mistakeTagSuggestions" placeholder="计算错误, 概念不清, 审题错误" />
                <datalist id="mistakeTagSuggestions"></datalist>
                <small>使用逗号分隔，保存题目时一并更新。</small>
              </label>
              <div class="learning-block">
                <span>下一次复习</span>
                <p id="nextReviewText" class="review-time">尚未安排</p>
                <div id="scheduleReviewControls" class="schedule-review-controls">
                  <input id="reviewDueAtInput" type="datetime-local" aria-label="复习时间" />
                  <button id="scheduleReviewButton" class="ghost-button" type="button">安排复习</button>
                </div>
                <span id="reviewScheduleState" class="state-text" role="status" aria-live="polite"></span>
              </div>
            </section>

            <div class="detail-actions">
              <div class="export-actions">
                <button id="exportJsonButton" class="ghost-button" type="button">导出 JSON</button>
                <button id="exportMarkdownButton" class="ghost-button" type="button">导出 Markdown</button>
              </div>
              <div class="archive-actions">
                <button id="archiveQuestionButton" class="danger-button" type="button">归档题目</button>
                <button id="restoreQuestionButton" class="ghost-button" type="button" hidden>恢复题目</button>
              </div>
              <button id="copyRawButton" class="ghost-button" type="button">采用 OCR</button>
              <button id="rerunOcrButton" class="ghost-button" type="button">&#37325;&#26032;&#35782;&#21035;&#21407;&#22270;</button>
              <span id="saveState" class="state-text" role="status" aria-live="polite">未修改</span>
            </div>
          </form>
        </section>
      </section>
    </main>


    <nav class="bottom-nav" aria-label="&#20027;&#35201;&#30446;&#24405;">
      <button class="bottom-nav-item is-active" type="button" data-target-view="home" aria-current="page"><span>H</span><strong>&#39318;&#39029;</strong></button>
      <button class="bottom-nav-item" type="button" data-target-view="library"><span>Q</span><strong>&#39064;&#24211;</strong></button>
      <button class="bottom-nav-item" type="button" data-target-view="review"><span>R</span><strong>&#22797;&#20064;</strong></button>
      <button class="bottom-nav-item" type="button" data-target-view="stats"><span>S</span><strong>&#32479;&#35745;</strong></button>
    </nav>

    <script src="/app/static/app.js" defer></script>
  </body>
</html>
